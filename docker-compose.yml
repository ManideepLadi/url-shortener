services:
  postgres:
    profiles: ["full"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: urlshortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d urlshortener"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    profiles: ["full"]
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      BASE_URL: http://localhost:8000
      LOG_LEVEL: INFO
    # Uncomment when PostgreSQL + Redis are enabled in the app code:
    # profiles: ["full"]
    # env_file:
    #   - .env.example
    # environment:
    #   DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/urlshortener
    #   REDIS_URL: redis://redis:6379/0
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    #   redis:
    #     condition: service_healthy

volumes:
  postgres_data:
